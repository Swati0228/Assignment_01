<!-- Floating Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-page">
  <div class="login-card">
    <!-- Logo / Icon -->
    <div class="login-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#lgGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="lgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe"/>
            <stop offset="100%" stop-color="#f5576c"/>
          </linearGradient>
        </defs>
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
    </div>

    <h1 class="login-title">Sensex <span class="gradient-text">Dashboard</span></h1>
    <p class="login-subtitle">Sign in to access your market data</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email -->
      <div class="field-group">
        <label for="email" class="field-label">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input id="email" type="email" formControlName="email" class="field-input" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="password" class="field-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="password" type="password" formControlName="password" class="field-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMsg" class="error-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ errorMsg }}
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="loading" class="btn-login">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner-wrap">
          <svg class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
          Logging in…
        </span>
      </button>
    </form>
  </div>
</div>
