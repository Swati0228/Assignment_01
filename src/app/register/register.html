<div class="login-page">
  <!-- Floating Orbs for premium glassmorphism background -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Main Register Card -->
  <div class="login-card">
    
    <div class="login-icon">
      <!-- Simple SVG icon -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe" />
            <stop offset="100%" stop-color="#f5576c" />
          </linearGradient>
        </defs>
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
    </div>

    <h2 class="login-title">Create <span class="gradient-text">Account</span></h2>
    <p class="login-subtitle">Register to access the Sensex Dashboard</p>

    <form class="login-form" (ngSubmit)="register()">

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input
            class="field-input"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="name@example.com"
            required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            class="field-input"
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Confirm Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            class="field-input"
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••"
            required>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="!email || !password || !confirmPassword">
        Create Account
      </button>

    </form>

    <div class="bottom-link">
      Already have an account?
      <a routerLink="/login">Sign In</a>
    </div>

  </div>
</div>
